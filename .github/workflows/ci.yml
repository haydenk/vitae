name: CI

on:
  push:
    branches: [master, develop]
    paths-ignore:
      - 'README.md'
  pull_request:
    branches: [master, develop]
    paths-ignore:
      - 'README.md'

env:
  INPUT: resume.tex
  NAME: hayden_king
  OUTDIR: out

jobs:
  build:
    name: Compile LaTeX
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache apt packages
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: /var/cache/apt/archives
          key: apt-texlive-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-texlive-${{ runner.os }}-

      - name: Install TeX Live
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-font-utils \
            texlive-lang-greek \
            latexmk

      - name: Install inter font package
        run: |
          tlmgr init-usertree
          tlmgr option repository https://ftp.math.utah.edu/pub/tex/historic/systems/texlive/2023/tlnet-final
          tlmgr --usermode install inter

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Build
        run: mise run build

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: resume-pdf
          path: ${{ env.OUTDIR }}/${{ env.NAME }}.pdf
          if-no-files-found: error
