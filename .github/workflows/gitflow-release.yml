name: GitFlow Release

on:
  pull_request:
    types: [closed]
    branches:
      - master

jobs:
  tag-and-backmerge:
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    name: Tag and Back-merge
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from branch name
        id: version
        run: |
          branch="${{ github.event.pull_request.head.ref }}"
          version="${branch#release/}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.version.outputs.version }} already exists, skipping."
          else
            git tag "v${{ steps.version.outputs.version }}"
            git push origin "v${{ steps.version.outputs.version }}"
          fi

      - name: Back-merge master into develop
        run: |
          git fetch origin develop
          git checkout develop
          git merge master --no-edit -m "chore: back-merge master into develop after release v${{ steps.version.outputs.version }}"
          git push origin develop

  publish:
    name: Publish Release
    needs: tag-and-backmerge
    uses: ./.github/workflows/release.yml
    with:
      tag: v${{ needs.tag-and-backmerge.outputs.version }}
      dry_run: false
    permissions:
      contents: write
