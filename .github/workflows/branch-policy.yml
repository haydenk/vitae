name: Branch Policy

on:
  pull_request:
    branches:
      - master
      - develop

jobs:
  validate-branch:
    name: Validate Branch Policy
    runs-on: ubuntu-latest
    steps:
      - name: Check branch naming policy
        run: |
          TARGET="${{ github.base_ref }}"
          SOURCE="${{ github.head_ref }}"

          if [ "$TARGET" = "master" ]; then
            if [[ "$SOURCE" != release/* ]]; then
              echo "PRs to master must come from a release/* branch (got: $SOURCE)"
              exit 1
            fi
          fi

          if [ "$TARGET" = "develop" ]; then
            if [[ "$SOURCE" != feature/* && "$SOURCE" != bugfix/* && "$SOURCE" != chore/* && "$SOURCE" != hotfix/* && "$SOURCE" != release/* && "$SOURCE" != dependabot/* ]]; then
              echo "PRs to develop must come from feature/*, bugfix/*, chore/*, hotfix/*, release/*, or dependabot/* branches (got: $SOURCE)"
              exit 1
            fi
          fi

          echo "Branch policy check passed ($SOURCE -> $TARGET)"
